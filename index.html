<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERDIMENSION ACADEMY</title>

  <style>

    body{
      background:#0a0a0a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:50px;
    }

    h1{
      color:#8b5cf6;
      font-size:50px;
    }

    .box{
      background:#151515;
      padding:30px;
      border-radius:15px;
      max-width:700px;
      margin:auto;
    }

    input{
      width:250px;
      padding:12px;
      border-radius:10px;
      border:none;
      font-size:16px;
      text-align:center;
    }

    button{
      background:#8b5cf6;
      color:white;
      border:none;
      padding:15px 30px;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      opacity:0.8;
    }

    #resultado{
      margin-top:20px;
      font-size:20px;
    }

  </style>

</head>

<body>

  <div class="box">

    <h1>CYBERDIMENSION ACADEMY</h1>

    <p>
      Aprenda cibersegurança na prática através de desafios reais.
    </p>

    <br>

    <h2>DESAFIO #1</h2>

    <p>
      Descubra qual é a porta padrão do SSH.
    </p>

    <input id="flag" placeholder="Digite a resposta">

    <br><br>

    <button onclick="validar()">
      ENVIAR
    </button>

    <p id="resultado"></p>

  </div>

  <script>

    function validar(){

      let flag = document.getElementById("flag").value;

      if(flag === "22"){

        document.getElementById("resultado").innerHTML =
        "✅ Parabéns! Você concluiu o desafio.";

      } else {

        document.getElementById("resultado").innerHTML =
        "❌ Resposta incorreta.";

      }

    }

  </script>

</body>
</html>
